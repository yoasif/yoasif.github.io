{% comment %}
  Usage: {% include youtube.html id="VIDEO_ID" title="Optional Title" %}
{% endcomment %}

<div class="video-container">
  <lite-youtube videoid="{{ include.id }}" 
                playlabel="{{ include.title | default: 'Play Video' }}"
                style="background-image: url('https://i.ytimg.com/vi/{{ include.id }}/hqdefault.jpg');">
    <a href="https://youtube.com/watch?v={{ include.id }}" class="lty-playbtn" title="Play Video">
      <span class="lyt-visually-hidden">Play Video: {{ include.title }}</span>
    </a>
  </lite-youtube>
</div>
